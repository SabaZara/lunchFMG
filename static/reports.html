<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>რეპორტები — სასადილო</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="topbar">
    <h1>სასადილო</h1>
    <nav>
      <a href="/admin">ბარათები</a>
      <a href="/reports" class="active">რეპორტები</a>
    </nav>
    <span class="spacer"></span>
    <span class="user" id="userLabel"></span>
    <button class="ghost small" id="logoutBtn">გასვლა</button>
  </header>

  <div class="container">
    <!-- Today -->
    <div class="card">
      <h2><span class="h2-ico">📊</span> დღეს</h2>
      <div class="stat-grid">
        <div class="stat accent-ok"><div class="n" id="statAte">–</div><div class="l">ნაჭამი (კაცი)</div></div>
        <div class="stat accent-primary"><div class="n" id="statMeals">–</div><div class="l">სულ კვება</div></div>
        <div class="stat"><div class="n" id="statActive">–</div><div class="l">აქტიური ბარათები</div></div>
        <div class="stat accent-warn"><div class="n" id="statRemaining">–</div><div class="l">ჯერ არ უჭამია</div></div>
      </div>
      <small id="todayDate" style="color:var(--muted)"></small>
    </div>

    <!-- Range + quick buttons -->
    <div class="card">
      <h2>პერიოდი</h2>
      <div class="row" style="margin-bottom:10px">
        <button class="ghost small" data-range="today">დღეს</button>
        <button class="ghost small" data-range="week">ეს კვირა</button>
        <button class="ghost small" data-range="month">ეს თვე</button>
      </div>
      <div class="row">
        <label class="ltr">დან <input id="fromDate" type="date" /></label>
        <label class="ltr">მდე <input id="toDate" type="date" /></label>
        <button id="applyBtn">ჩვენება</button>
      </div>
      <div class="row" style="margin-top:12px">
        <span style="color:var(--muted)">ჩამოტვირთვა:</span>
        <button class="ghost small" id="attXlsx">დასწრება .xlsx</button>
        <button class="ghost small" id="attCsv">დასწრება .csv</button>
        <button class="ghost small" id="detXlsx">დეტალები .xlsx</button>
        <button class="ghost small" id="detCsv">დეტალები .csv</button>
      </div>
      <div id="rangeMsg"></div>
    </div>

    <!-- Daily counts -->
    <div class="card">
      <h2>დღიური რაოდენობა</h2>
      <table>
        <thead><tr><th class="ltr">თარიღი</th><th>ნაჭამი</th></tr></thead>
        <tbody id="dailyBody"></tbody>
      </table>
    </div>

    <!-- Day detail -->
    <div class="card">
      <h2><span class="h2-ico">🍽</span> კონკრეტული დღე — ვინ ჭამა</h2>
      <div class="row" style="margin-bottom:10px">
        <input id="dayDate" type="date" class="ltr" />
        <button id="dayBtn" class="ghost">ჩვენება</button>
        <span id="dayCount" style="color:var(--muted)"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th class="ltr">ბარათის ID</th><th>კვების რაოდენობა</th><th class="ltr">დროები</th></tr></thead>
          <tbody id="dayBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/reports.js"></script>
</body>
</html>
